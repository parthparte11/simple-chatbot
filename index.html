<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-API AI ChatBot - Auto Failover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Home Page -->
    <div class="home-container" id="homePage">
        <div class="hero-section">
            <h1>🤖 AI ChatBot</h1>
            <p>hello, I'm your AI assistant!</p>
        </div>
        
        <div class="stats-container" id="apiStats">
            <!-- API stats will be dynamically inserted here -->
        </div>
        
        </div>

        <button class="cta-button" id="startChatBtn">
            Start Chatting Now →
        </button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <button class="header-button" id="homeBtn">← Home</button>
            <h2>AI Assistant</h2>
            <div class="header-buttons">
                <span class="api-status" id="activeApiStatus">🟢 Gemini</span>
                <button class="header-button" id="clearChatBtn">Clear Chat</button>
                <button class="header-button" id="statusBtn">📊 Status</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    👋 Hello! I'm your AI assistant
                    What would you like to discuss today?
                </div>
                <div class="timestamp">Just now</div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="chat-input-container">
            <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
            <button id="sendButton">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- API Details Modal -->
    <div class="modal" id="apiModal">
        <div class="modal-content">
            <h2>📊 API Status Dashboard</h2>
            <div id="apiDetailsList" class="api-details-list">
                <!-- API details will be inserted here -->
            </div>
            <button class="modal-close-btn" id="closeModalBtn">Close</button>
        </div>
    </div>

    <!-- Load script at the end -->
    <script src="script.js"></script>
</body>
</html>
